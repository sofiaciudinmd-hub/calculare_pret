<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Pret</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h2 {
            font-size: 24px;
        }

        input {
            width: 180px;
            height: 30px;
            font-size: 18px;
            padding: 4px 8px;
            margin-bottom: 20px;
        }

        button {
            width: 55px;
            height: 40px;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
            border: 1px solid #888;
            background: #f0f0f0;
        }

        button.active {
            background-color: #2d89ef;
            color: white;
            border: 2px solid #0059b3;
            font-weight: bold;
        }

        h3 {
            font-size: 20px;
        }
    </style>
</head>

<body>

<h2>Calculator Pret</h2>

<input type="number" id="nr" placeholder="Introdu numarul">

<br><br>

<button onclick="calculeaza(10, this)">10%</button>
<button onclick="calculeaza(10.5, this)">10.5%</button>
<button onclick="calculeaza(11, this)">11%</button>
<button onclick="calculeaza(11.5, this)">11.5%</button>
<button onclick="calculeaza(12, this)">12%</button>

<h3 id="net">Pret net: 0</h3>
<h3 id="comision">Comision: 0</h3>
<h3 id="brut">Pret brut: 0</h3>

<script>
function calculeaza(procent, btn) {

    // Evidentiaza butonul selectat
    document.querySelectorAll("button").forEach(function(b) {
        b.classList.remove("active");
    });

    btn.classList.add("active");

    let nr = parseFloat(document.getElementById("nr").value);

    if (isNaN(nr)) return;

    let pretNet = nr - nr * (procent / 100);

    let comision = 0;

    if (pretNet <= 599) comision = 50;
    else if (pretNet <= 699) comision = 60;
    else if (pretNet <= 799) comision = 70;
    else if (pretNet <= 999) comision = 80;
    else if (pretNet <= 1999) comision = 90;
    else if (pretNet <= 3999) comision = 100;
    else if (pretNet <= 5999) comision = 150;
    else if (pretNet < 7499) comision = 200;
    else comision = 250;

    let pretBrut = pretNet + comision;

    document.getElementById("net").innerText = "Pret net: " + Math.round(pretNet);
    document.getElementById("comision").innerText = "Comision: " + comision;
    document.getElementById("brut").innerText = "Pret brut: " + Math.round(pretBrut);
}
</script>

</body>
</html>
